<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Inicio · Real de Miramar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/estilo.css">
</head>
<body>
<div id="nav"></div>
<main id="app"></main>
<footer>Real de Miramar · tablero del proyecto — datos administrados desde el Google Sheet Maestro.<div id="stamp" style="margin-top:4px;"></div></footer>
<script src="assets/board.js"></script>
<script>
window.renderPage=function(B){
  var h="";
  var num=function(x){var n=Number(String(x==null?"":x).replace(/[^0-9.\-]/g,""));return isNaN(n)?0:n;};

  /* ============ 1. EL CAMINO ============ */
  var hitos=B.hitosOrd();
  var ea=B.etapaActual(), cur=ea.cur, next=ea.next, idx=ea.idx;
  h+='<h2 class="sec">El camino · etapa actual</h2><div class="card">';
  if(!hitos.length){
    h+='<div class="nota">Sin etapas registradas todavía.</div>';
  }else{
    h+='<div class="camino">';
    hitos.forEach(function(hi,i){
      var cl=B.clase(hi.estado), here=(i===idx);
      h+='<div class="step '+cl+(here?' here':'')+'">';
      if(here)h+='<span class="here-tag">estás aquí</span>';
      h+='<div class="n">Etapa '+B.esc(hi.orden)+'</div>';
      h+='<div class="nm">'+B.esc(hi.nombre)+'</div>';
      if(!B.lite()){
        h+='<div class="pr">'+B.esc(B.money(hi.precio_m2))+'/m²</div>';
      }else if(cl!=="verde"){
        h+='<div class="pr">🔒</div>';
      }
      h+='</div>';
    });
    h+='</div>';
    if(cur){
      var gates=B.gatesDe(cur.hito_id);
      var cerr=gates.filter(function(g){return B.clase(g.estado)==="verde";}).length;
      var pct=gates.length?Math.round(cerr/gates.length*100):0;
      h+='<div class="gaterow">';
      h+='<div class="gbar"><div class="nota">Candados de esta etapa · '+cerr+' de '+gates.length+' cerrados</div>'+
         '<div class="progress"><i style="width:'+pct+'%;"></i></div></div>';
      if(next){
        var pc=num(cur.precio_m2), pn=num(next.precio_m2);
        if(!B.lite()&&pc>0&&pn>0){
          var d=Math.round((pn-pc)/pc*1000)/10;
          h+='<span class="chip on">+'+d+'% al cerrar → '+B.esc(next.nombre)+'</span>';
        }else{
          h+='<span class="chip on">al cerrar sube a '+B.esc(next.nombre)+'</span>';
        }
      }
      h+='<span class="chip">'+B.esc(B.fmtEta(B.etaEtapa(cur.hito_id)))+'</span>';
      h+='</div>';
    }
  }
  h+='</div>';

  /* ============ 2. BANNER VENTA (única mención del bloqueo) ============ */
  var puertas=B.puertasCalc();
  if(!puertas.length){
    h+='<div class="nota" style="margin-top:10px;">Sin puertas de cumplimiento registradas todavía.</div>';
  }else{
    var pv=puertas.filter(function(p){return p.estado==="verde";}).length;
    var ok=B.ventaHabilitada();
    h+='<div class="gatebanner'+(ok?' ok':'')+'">';
    if(ok){
      h+='Venta habilitada · '+pv+' de '+puertas.length+' puertas en verde.';
    }else{
      h+='Venta aún no habilitada · '+pv+' de '+puertas.length+' puertas en verde.';
      var cuello=null;
      puertas.forEach(function(p){if(!cuello&&p.estado!=="verde"&&/bbva|hipoteca/i.test(String(p.puerta)))cuello=p;});
      if(cuello)h+=' Cuello: '+B.esc(cuello.puerta)+'.';
    }
    h+=' <a href="tramites.html#legal">ver puertas</a></div>';
  }

  /* ============ 3. TILES ============ */
  h+='<div class="tiles">';

  /* --- tile SIGUE AHORA --- */
  h+='<div class="tile"><div class="tt">Sigue ahora</div><div class="tv">';
  var fr=B.frontera(3);
  if(!fr.length){
    h+='<span class="nota">Nada pendiente por destrabar ahora mismo.</span>';
  }else{
    fr.forEach(function(t){
      h+='<a href="tramites.html#'+encodeURIComponent(String(t.tramite_id))+'" style="display:block;margin-bottom:6px;color:inherit;text-decoration:none;">'+
         '<strong>'+B.esc(t.nombre)+'</strong><br>'+
         '<span class="nota">'+B.esc(t.responsable_nombre||"—")+' · '+B.esc(B.fmtEta(B.etaDe(t)))+'</span></a>';
    });
  }
  h+='</div></div>';

  /* --- tile TRÁMITES --- */
  var c=B.conteos();
  h+='<a class="tile" href="tramites.html"><div class="tt">Trámites</div>';
  if(!c.total){
    h+='<div class="tv"><span class="nota">Sin trámites registrados todavía.</span></div>';
  }else{
    var wv=Math.round(c.verde/c.total*100), wa=Math.round(c.amar/c.total*100), wr=Math.max(0,100-wv-wa);
    h+='<div class="stackbar"><span class="v" style="width:'+wv+'%;"></span><span class="a" style="width:'+wa+'%;"></span><span class="r" style="width:'+wr+'%;"></span></div>';
    h+='<div class="tv">'+c.verde+' hechos · '+c.amar+' en proceso · '+c.rojo+' faltan';
    var cerrados=B.tabla("TRAMITES").filter(function(t){return String(t.fecha_real_fin||"").trim()!=="";});
    cerrados.sort(function(a,b){return new Date(String(b.fecha_real_fin)+"T12:00:00")-new Date(String(a.fecha_real_fin)+"T12:00:00");});
    if(cerrados.length){
      h+='<br><span class="nota">Último cierre: '+B.esc(cerrados[0].nombre)+' · '+B.esc(B.fmtFecha(cerrados[0].fecha_real_fin))+'</span>';
    }
    h+='</div>';
  }
  h+='</a>';

  /* --- tile EVIDENCIA --- */
  var vmap=B.videosPor(), nvid=0, k;
  for(k in vmap){if(vmap.hasOwnProperty(k))nvid+=vmap[k].length;}
  var ndocs=B.docsVigentes().length;
  var bita=B.tabla("BITACORA").slice();
  bita.sort(function(a,b){return new Date(String(b.fecha)+"T12:00:00")-new Date(String(a.fecha)+"T12:00:00");});
  h+='<a class="tile" href="evidencia.html"><div class="tt">Evidencia</div><div class="tv">'+
     nvid+' videos · '+ndocs+' documentos vigentes';
  if(bita.length){
    h+='<br><span class="nota">Última entrada: '+B.esc(bita[0].titulo)+'</span>';
  }else{
    h+='<br><span class="nota">Sin entradas de bitácora todavía.</span>';
  }
  h+='</div></a>';

  /* --- tile CUENTAS --- */
  h+='<a class="tile" href="cuentas.html"><div class="tt">🔒 Cuentas</div>'+
     '<div class="tv">cuentas internas del proyecto · clave financiera</div></a>';

  h+='</div>';

  /* ============ 4. FILA FINAL ============ */
  h+='<div class="tiles">';
  var portal=B.config("portal_codesarrolladores_url");
  if(portal&&portal.indexOf("http")===0){
    h+='<a class="tile" href="'+B.esc(portal)+'" target="_blank" rel="noopener"><div class="tt">Co-desarrolladores</div>'+
       '<div class="tv">Mi dinero y aportaciones → portal Co-desarrolladores</div></a>';
  }
  var urg=B.tabla("TRAMITES").filter(function(t){return /^si/i.test(String(t.urgente||""))&&B.clase(t.estado)!=="verde";}).length;
  h+='<a class="tile oscuro" href="direccion.html"><div class="tt">🔒 Dirección</div>'+
     '<div class="tv">Dirección · solo operador'+(urg?('<br><span style="color:#c9b7a0;">'+urg+' urgentes por resolver</span>'):'')+'</div></a>';
  h+='</div>';

  /* ============ hint modo lite ============ */
  if(B.lite()){
    h+='<div class="hint" style="text-align:center;">¿Eres parte del proyecto? '+
       '<button class="btn ghost" onclick="location.href=\'tramites.html\'">Entra con tu clave</button></div>';
  }

  B.$("app").innerHTML=h;
  B.$("stamp").textContent="Actualizado: "+(B.meta().actualizado?new Date(B.meta().actualizado).toLocaleString("es-MX"):"—");
};
Board.init({page:"index",sub:"tablero del proyecto"});
</script>
</body>
</html>
