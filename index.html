      else if(tok==='titulo')g+='<h3>'+(ico?(B.esc(ico)+' '):'')+B.esc(t.nombre)+'</h3>';
      else if(tok==='estado')g+='<span class="idst '+cl+'"><span class="p"></span>'+estTxt+'</span>';
      else if(tok.indexOf('sec:')===0){var i=tok.indexOf('=');var titu=i<0?tok.slice(4):tok.slice(4,i);var inner=(i<0?[]:tok.slice(i+1).split(',')).map(function(c){return fldHTML(t,c.trim());}).join('');if(inner)g+=(titu?'<div class="idsech">'+B.esc(titu)+'</div>':'')+inner;}
      else if(tok==='deps'){if(deps.length)g+='<div class="idfl"><div class="k">Depende de</div><div class="idch">'+chipsDe(deps)+'</div></div>';}
      else if(tok==='desbloquea'){if(desb.length)g+='<div class="idfl"><div class="k">Desbloquea</div><div class="idch">'+chipsDe(desb)+'</div></div>';}
      else if(tok==='docs')g+=docsHTML(t);
      else if(tok==='extras')g+=extrasHTML(t);
      else if(tok==='botones'){g+=botonesH;hayBot=true;}
      else g+=fldHTML(t,tok);
    });
    if(!hayBot)g+=botonesH; // red de seguridad: la ficha SIEMPRE trae acciones
    return g;
  }
  window.abrirDrw=function(id){
    var t=B.tramitePor(id); if(!t)return;
    B.$("idrw").innerHTML=renderFicha(t); B.$("idrw").className="on"; B.$("idrwov").className="on";
  };
  window.cerrarDrw=function(){B.$("idrw").className="";B.$("idrwov").className="";};
  function editKey(){try{return sessionStorage.getItem("rm_edit_v1")||"";}catch(e){return"";}}
  function adminKey(){try{return sessionStorage.getItem("rm_admin_v1")||"";}catch(e){return"";}}
  window.entrarAdmin=function(){var k=prompt("Clave del dueño (Modo Dueño)");if(!k)return;try{sessionStorage.setItem("rm_admin_v1",k.trim());}catch(e){}window.renderPage(B);};
  window.salirAdmin=function(){try{sessionStorage.removeItem("rm_admin_v1");}catch(e){}window.renderPage(B);};
  function adminFallo(j){if(j&&(j.error==="clave incorrecta"||j.error==="solo admin"||j.error==="solo admin crea trámites")){try{sessionStorage.removeItem("rm_admin_v1");}catch(e){}B.toast("Clave del dueño incorrecta",true);return true;}return false;}
  window.toggleEnt=function(id,idx){
    var key=adminKey()||editKey();
    if(!key){var k=prompt("Clave de edición");if(!k)return;try{sessionStorage.setItem("rm_edit_v1",k.trim());}catch(e){}key=k.trim();}
    var t=B.tramitePor(id);if(!t)return;
    var items=entItems(t);if(!items[idx])return;
    var it=items[idx];
    items[idx]=/=si$/i.test(it)?(it.replace(/=si$/i,'=no')):(/=no$/i.test(it)?it.replace(/=no$/i,'=si'):(it+'=si'));
    var nuevo=items.join(' · ');
    t.entregables=nuevo; B.$("idrw").innerHTML=renderFicha(t);
    B.post({tipo:"tramite",tramite_id:id,entregables:nuevo,secret:key},function(err,j){
      if(err||!j||!j.ok){B.toast("No se pudo guardar la palomita",true);}
    });
  };
  window.editarFicha=function(id){
    if(!editKey()){var k=prompt("Clave de edición (para guardar en el Sheet)");if(!k)return;try{sessionStorage.setItem("rm_edit_v1",k.trim());}catch(e){}}
    var t=B.tramitePor(id);if(!t)return;
    var inp=function(lbl,name,val,ph){return '<div class="idfl"><div class="k">'+lbl+'</div><input id="ed_'+name+'" value="'+B.esc(val==null?"":val)+'" placeholder="'+B.esc(ph||"")+'"></div>';};
    var cur=B.clase(t.estado);
    var g='<span class="x" onclick="abrirDrw(\''+id+'\')">×</span><div class="idbad"><span class="idb oro">✎ Editando · se guarda en el Sheet</span></div>';
    g+='<div style="font-size:11px;color:var(--piedra);letter-spacing:1px;">'+B.esc(id)+'</div><h3>'+B.esc(t.nombre)+'</h3>';
    g+='<div class="idfl"><div class="k">Estado</div><select id="ed_estado">'+["verde","amarillo","rojo"].map(function(o){var m=(o==="verde"&&cur==="verde")||(o==="amarillo"&&cur==="amar")||(o==="rojo"&&cur==="rojo");return '<option'+(m?' selected':'')+'>'+o+'</option>';}).join("")+'</select></div>';
    g+=inp("Responsable","responsable_nombre",t.responsable_nombre);
    g+=inp("Oficio / folio","oficio_folio",t.oficio_folio);
    g+=inp("Fecha inicio (aaaa-mm-dd)","fecha_inicio_est",t.fecha_inicio_est,"2026-07-01");
    g+=inp("Duración (semanas)","duracion_sem",t.duracion_sem,"4");
    g+=inp("Fecha terminado (aaaa-mm-dd)","fecha_real_fin",t.fecha_real_fin,"vacío = aún no");
    g+='<div class="idfl"><div class="k">Por qué importa</div><textarea id="ed_por_que_importa">'+B.esc(t.por_que_importa==null?"":t.por_que_importa)+'</textarea></div>';
    g+='<div class="idfl"><div class="k">Notas</div><textarea id="ed_notas">'+B.esc(t.notas==null?"":t.notas)+'</textarea></div>';
    g+=inp("Link de documentos (Drive)","link",t.link,"https://drive.google.com/...");
    g+='<div class="idfl"><div class="k">Entregables (separa con · y palomea con =si)</div><textarea id="ed_entregables">'+B.esc(t.entregables==null?"":t.entregables)+'</textarea></div>';
    var sopTxt='';try{sopTxt=JSON.parse(t.soportes||'[]').map(function(s){return (s.t||'archivo')+' | '+(s.u||'');}).join('\n');}catch(e){}
    g+='<div class="idfl"><div class="k">Soportes (uno por línea: Título | https://…)</div><textarea id="ed_soportes">'+B.esc(sopTxt)+'</textarea></div>';
    g+='<div class="idsave"><button class="btn ghost" onclick="abrirDrw(\''+id+'\')">Cancelar</button><button class="btn" id="ed_save" onclick="guardarFicha(\''+id+'\')">Guardar</button></div>';
    B.$("idrw").innerHTML=g;
  };
  window.guardarFicha=function(id){
    var v=function(n){var el=B.$("ed_"+n);return el?el.value:"";};
    var bt=B.$("ed_save");if(bt){bt.disabled=true;bt.textContent="Guardando…";}
    var sop=v("soportes").split('\n').map(function(l){return l.trim();}).filter(Boolean).map(function(l){var i=l.indexOf('|');return i>0?{t:l.slice(0,i).trim(),u:l.slice(i+1).trim()}:{t:'archivo',u:l};});
    B.post({tipo:"tramite",tramite_id:id,secret:adminKey()||editKey(),
      estado:v("estado"),responsable_nombre:v("responsable_nombre"),oficio_folio:v("oficio_folio"),
      fecha_inicio_est:v("fecha_inicio_est"),duracion_sem:v("duracion_sem"),fecha_real_fin:v("fecha_real_fin"),
      por_que_importa:v("por_que_importa"),notas:v("notas"),link:v("link"),
      entregables:v("entregables"),soportes:(sop.length?JSON.stringify(sop):"")},
    function(err,j){
      if(!err&&j&&j.ok){B.toast("Guardado ✓");window.cerrarDrw();B.refrescar();}
      else{if(j&&j.error==="clave incorrecta"){try{sessionStorage.removeItem("rm_edit_v1");}catch(e){}B.toast("Clave de edición incorrecta",true);}else B.toast("No se pudo guardar",true);if(bt){bt.disabled=false;bt.textContent="Guardar";}}
    });
  };
  /* ===== MODO DUEÑO: sistema de la ficha, alta, archivo, plantilla ===== */
  window.sistemaFicha=function(id){
    var t=B.tramitePor(id);if(!t)return;
    var inp=function(l,n,val,ph){return '<div class="idfl"><div class="k">'+l+'</div><input id="sy_'+n+'" value="'+B.esc(val==null?"":val)+'" placeholder="'+B.esc(ph||"")+'"></div>';};
    var g='<span class="x" onclick="abrirDrw(\''+id+'\')">×</span><div class="idbad"><span class="idb oro">⚙ Sistema · solo el dueño</span></div>';
    g+='<div style="font-size:11px;color:var(--piedra);letter-spacing:1px;">'+B.esc(id)+'</div><h3>'+B.esc(t.nombre)+'</h3>';
    g+=inp("Nombre del trámite","nombre",t.nombre);
    g+=inp("Icono (emoji)","icono",t.icono,"🏛");
    g+='<div class="idfl"><div class="k">Etapa</div><select id="sy_paquete_etapa">'+hitos.map(function(hh){return '<option value="'+B.esc(hh.hito_id)+'"'+(hh.hito_id===t.paquete_etapa?' selected':'')+'>'+B.esc(hh.nombre)+'</option>';}).join("")+'</select></div>';
    g+=inp("Depende de (T01,T02…)","depende_de",t.depende_de);
    g+=inp("Autoridad","autoridad",t.autoridad);
    g+='<div class="idfl"><div class="k">Campos extra (Nombre=valor|Otro=valor)</div><textarea id="sy_extras">'+B.esc(t.extras||"")+'</textarea></div>';
    g+='<div class="idfl"><div class="k">Plantilla SOLO de esta ficha (vacío = usa la global)</div><textarea id="sy_ficha_override" placeholder="'+B.esc(DEF_TPL)+'">'+B.esc(t.ficha_override||"")+'</textarea></div>';
    g+='<div class="idsave"><button class="btn ghost" style="color:var(--rojo);" onclick="archivarT(\''+id+'\')">🗄 Archivar</button><button class="btn ghost" onclick="abrirDrw(\''+id+'\')">Cancelar</button><button class="btn" id="sy_save" onclick="guardarSistema(\''+id+'\')">Guardar</button></div>';
    B.$("idrw").innerHTML=g;
  };
  window.guardarSistema=function(id){
    var v=function(n){var el=B.$("sy_"+n);return el?el.value:"";};
    var bt=B.$("sy_save");if(bt){bt.disabled=true;bt.textContent="Guardando…";}
    B.post({tipo:"tramite",tramite_id:id,secret:adminKey(),
      nombre:v("nombre"),icono:v("icono"),paquete_etapa:v("paquete_etapa"),
      depende_de:v("depende_de"),autoridad:v("autoridad"),
      extras:v("extras"),ficha_override:v("ficha_override")},
    function(err,j){
      if(!err&&j&&j.ok){B.toast("Sistema guardado ✓");window.cerrarDrw();B.refrescar();}
      else{if(!adminFallo(j))B.toast("No se pudo guardar",true);if(bt){bt.disabled=false;bt.textContent="Guardar";}}
    });
  };
  window.archivarT=function(id){
    var dep=CH[id]||[];
    var msg="¿Archivar "+id+"? Desaparece del board pero queda en el Sheet (recuperable)."+(dep.length?("\n\nOJO: dependen de él: "+dep.join(", ")):"");
    if(!confirm(msg))return;
    B.post({tipo:"tramite",tramite_id:id,archivado:"si",secret:adminKey()},function(err,j){
      if(!err&&j&&j.ok){B.toast("Archivado — recuperable en el Sheet");window.cerrarDrw();B.refrescar();}
      else if(!adminFallo(j))B.toast("No se pudo archivar",true);
    });
  };
  window.nuevoTramite=function(){
    var mx=0;tr.forEach(function(t){var m=String(t.tramite_id||"").match(/^T(\d+)$/);if(m)mx=Math.max(mx,Number(m[1]));});
    var nid="T"+(mx+1<10?"0":"")+(mx+1);
    var resp=String(B.config('responsables')||'').split('|').filter(Boolean);
    var g='<span class="x" onclick="cerrarDrw()">×</span><div class="idbad"><span class="idb oro">＋ Nuevo trámite · '+nid+'</span></div>';
    g+='<div class="idfl"><div class="k">Nombre *</div><input id="nu_nombre" placeholder="Ej. Dictamen de …"></div>';
    g+='<div class="idfl"><div class="k">Etapa</div><select id="nu_paquete_etapa">'+hitos.map(function(hh,i){return '<option value="'+B.esc(hh.hito_id)+'"'+(i===curi?' selected':'')+'>'+B.esc(hh.nombre)+'</option>';}).join("")+'</select></div>';
    g+='<div class="idfl"><div class="k">Depende de (T01,T02…)</div><input id="nu_depende_de"></div>';
    g+='<div class="idfl"><div class="k">Duración (semanas)</div><input id="nu_duracion_sem" value="4"></div>';
    g+='<div class="idfl"><div class="k">¿Urgente?</div><select id="nu_urgente"><option>no</option><option>si</option></select></div>';
    g+='<div class="idfl"><div class="k">Responsable</div><input id="nu_responsable_nombre" list="dlresp"><datalist id="dlresp">'+resp.map(function(r){return '<option value="'+B.esc(r)+'">';}).join("")+'</datalist></div>';
    g+='<div class="idfl"><div class="k">Autoridad</div><input id="nu_autoridad"></div>';
    g+='<div class="idfl"><div class="k">Icono (emoji, opcional)</div><input id="nu_icono"></div>';
    g+='<div class="idsave"><button class="btn ghost" onclick="cerrarDrw()">Cancelar</button><button class="btn" id="nu_save" onclick="guardarNuevo(\''+nid+'\')">Crear '+nid+'</button></div>';
    B.$("idrw").innerHTML=g;B.$("idrw").className="on";B.$("idrwov").className="on";
  };
  window.guardarNuevo=function(nid){
    var v=function(n){var el=B.$("nu_"+n);return el?el.value:"";};
    if(!v("nombre").trim()){B.toast("Ponle nombre al trámite",true);return;}
    var deps=v("depende_de").split(/[,;\s]+/).filter(Boolean),malos=deps.filter(function(d){return !B.tramitePor(d);});
    if(malos.length&&!confirm("Estas dependencias no existen: "+malos.join(", ")+"\n¿Crear de todos modos?"))return;
    var bt=B.$("nu_save");if(bt){bt.disabled=true;bt.textContent="Creando…";}
    B.post({tipo:"tramite",tramite_id:nid,secret:adminKey(),estado:"rojo",
      nombre:v("nombre"),paquete_etapa:v("paquete_etapa"),depende_de:v("depende_de"),
      duracion_sem:v("duracion_sem"),urgente:v("urgente"),
      responsable_nombre:v("responsable_nombre"),autoridad:v("autoridad"),icono:v("icono")},
    function(err,j){
      if(!err&&j&&j.ok){B.toast(nid+" creado ✓");window.cerrarDrw();B.refrescar();}
      else{if(!adminFallo(j))B.toast("No se pudo crear",true);if(bt){bt.disabled=false;bt.textContent="Crear "+nid;}}
    });
  };
  /* editor visual de la plantilla GLOBAL (se guarda en CONFIG del Sheet) */
  var NOMBLQ={badges:'Etiquetas (etapa/urgente/ruta)',id:'ID del trámite',titulo:'Título',estado:'Semáforo',deps:'Depende de',desbloquea:'Desbloquea',docs:'Documentos (Drive/entregables/formato)',extras:'Campos extra del dueño',botones:'Botones'};
  var CAMPOS_DISP=['autoridad','responsable_nombre','oficio_folio','por_que_importa','decision','notas','costo_estimado','fecha_inicio_est','duracion_sem','fecha_real_fin','ola','gate','formato_url'];
  window.editorPlantilla=function(){
    window.__TPL=String(B.config('ficha_plantilla')||DEF_TPL).split('|').map(function(x){return x.trim();}).filter(Boolean);
    pintarTpl();B.$("idrw").className="on";B.$("idrwov").className="on";
  };
  function nomTok(tok){if(tok.indexOf('sec:')===0){var i=tok.indexOf('=');return 'Sección “'+(i<0?tok.slice(4):tok.slice(4,i))+'”';}return NOMBLQ[tok]||('Campo: '+lbl(tok));}
  function pintarTpl(){
    var T=window.__TPL;
    var g='<span class="x" onclick="cerrarDrw()">×</span><div class="idbad"><span class="idb oro">🎨 Plantilla de la ficha (global · se guarda en el Sheet)</span></div>';
    g+='<div class="hint" style="margin:6px 0 10px;">El orden de esta lista ES el orden de la ficha. Las secciones agrupan campos (edítalos con comas).</div>';
    T.forEach(function(tok,i){
      g+='<div class="tplrow"><span class="mv" onclick="tplMove('+i+',-1)">↑</span><span class="mv" onclick="tplMove('+i+',1)">↓</span><span class="nm">'+B.esc(nomTok(tok))+'</span>';
      if(tok.indexOf('sec:')===0){var j=tok.indexOf('=');g+='<input class="secf" value="'+B.esc(j<0?'':tok.slice(j+1))+'" oninput="tplSec('+i+',this.value)">';}
      g+='<span class="del" onclick="tplDel('+i+')">✕</span></div>';
    });
    var faltan=Object.keys(NOMBLQ).filter(function(k){return T.indexOf(k)<0;});
    g+='<div class="idfl" style="margin-top:12px;"><div class="k">Agregar bloque</div><select id="tpl_add"><option value="">—</option>'+faltan.map(function(k){return '<option value="'+k+'">'+NOMBLQ[k]+'</option>';}).join("")+CAMPOS_DISP.map(function(c){return '<option value="'+c+'">Campo: '+B.esc(lbl(c))+'</option>';}).join("")+'<option value="__sec">Sección nueva…</option></select> <button class="btn ghost" style="margin-top:6px;" onclick="tplAdd()">agregar</button></div>';
    g+='<div class="idsave"><button class="btn ghost" onclick="tplReset()">Restaurar de fábrica</button><button class="btn ghost" onclick="cerrarDrw()">Cancelar</button><button class="btn" id="tpl_save" onclick="tplSave()">Guardar plantilla</button></div>';
    B.$("idrw").innerHTML=g;
  }
  window.tplMove=function(i,d){var T=window.__TPL,j=i+d;if(j<0||j>=T.length)return;var x=T[i];T[i]=T[j];T[j]=x;pintarTpl();};
  window.tplDel=function(i){window.__TPL.splice(i,1);pintarTpl();};
  window.tplSec=function(i,v){var tok=window.__TPL[i],j=tok.indexOf('=');var titu=(j<0?tok.slice(4):tok.slice(4,j));window.__TPL[i]='sec:'+titu+'='+v.replace(/\|/g,',');};
  window.tplAdd=function(){var s=B.$("tpl_add");if(!s||!s.value)return;if(s.value==='__sec'){var n=prompt("Nombre de la sección");if(!n)return;var c=prompt("Campos (separados por coma)","notas");window.__TPL.push('sec:'+n.replace(/[|=]/g,' ')+'='+(c||'').replace(/\|/g,','));}else window.__TPL.push(s.value);pintarTpl();};
  window.tplReset=function(){window.__TPL=DEF_TPL.split('|');pintarTpl();};
  window.tplSave=function(){
    var bt=B.$("tpl_save");if(bt){bt.disabled=true;bt.textContent="Guardando…";}
    B.post({tipo:"config",clave:"ficha_plantilla",valor:window.__TPL.join('|'),secret:adminKey()},function(err,j){
      if(!err&&j&&j.ok){B.toast("Plantilla guardada ✓ — así se verán todas las fichas");window.cerrarDrw();B.refrescar();}
      else{if(!adminFallo(j))B.toast("No se pudo guardar",true);if(bt){bt.disabled=false;bt.textContent="Guardar plantilla";}}
    });
  };
  chips(); foco();
};
Board.init({page:"index",sub:"tablero del proyecto"});
</script>
