<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/estilo.css?v=19">
<link rel="stylesheet" href="https://alexpueblag.github.io/yod-portal/os/shell.css">

<body>
<div id="nav"></div>
<main id="app">
  <section>
    <div id="secResumen"></div>
    <div id="secEtapas"></div>
    <div class="viewtoggle worktabs" role="group" aria-label="Vista"><button id="vRuta" class="on" onclick="setVista('ruta')"><i class="ti ti-route"></i> Ruta conectada</button><button id="vTrabajo" onclick="setVista('trabajo')"><i class="ti ti-list-check"></i> Acciones</button><button id="vBoard" onclick="setVista('board')"><i class="ti ti-sitemap"></i> Dependencias</button><button id="vLista" onclick="setVista('lista')"><i class="ti ti-layout-grid"></i> Todos</button></div>
    <div id="secFiltros" class="filtros advanced"></div>
    <div id="secGrid"></div>
  </section>
  <details class="fold"><summary>Puertas legales</summary><div id="secLegal"></div></details>
  <details class="fold"><summary>Mapa de dependencias</summary><div id="secMapa"></div></details>
</main>
<footer>Real de Miramar · tablero del proyecto — datos administrados desde el Google Sheet Maestro.<div id="stamp" style="margin-top:4px;"></div></footer>
<script src="assets/board.js?v=12"></script>
<script>
/* ============================================================
   tramites.html — dueña del estado de trámites y puerta legal.
   CERO datos hardcodeados: todo sale de Board (Sheet Maestro).
   ============================================================ */
var BREF=null;      /* referencia a Board para handlers globales */
var FILTRO="todos"; /* estado del filtro del semáforo */
var VISTA="ruta"; /* la ruta completa explica el proyecto; acciones permite operarlo */
var ROUTE_ZOOM="90";
var ROUTE_CRITICA=true;
var WIRED=false;    /* evita listeners duplicados en re-render */

/* ---------- utilidades locales ---------- */
function idSafe(id){return String(id==null?"":id).replace(/[^\w\.\-]/g,"");}
function dotVar(cl){return cl==="gris"?"piedra":cl;} /* var(--gris) no existe */
function esSi(v){return /^si/i.test(String(v||"").trim());}
function mapaEtapas(B){var m={};B.hitosOrd().forEach(function(h,i){m[String(h.hito_id||"").trim()]={h:h,i:i};});return m;}
function pintarEtapas(B){
  var cont=B.$("secEtapas");if(!cont)return;
  var hs=B.hitosOrd();
  cont.innerHTML='<div class="techlegend"><span class="techintro">Filtrar etapa</span>'+hs.map(function(h,i){var f='etapa:'+idSafe(h.hito_id),on=FILTRO===f;return '<button type="button" class="techstep e'+(i%6)+(on?' on':'')+'" aria-pressed="'+(on?'true':'false')+'" onclick="setFiltroEtapa(\''+idSafe(h.hito_id)+'\')"><i>◆</i>'+B.esc(h.nombre||h.hito_id)+'</button>';}).join('<b>→</b>')+'</div>';
}

/* ---------- acordeón de puertas ---------- */
window.togglePta=function(cab){
  var p=cab.parentNode;
  if((" "+p.className+" ").indexOf(" open ")>=0)p.className=p.className.replace(/\s*\bopen\b/,"");
  else p.className+=" open";
};

/* ---------- 1. PUERTA LEGAL ---------- */
function pintarLegal(B){
  var cont=B.$("secLegal");if(!cont)return;
  var ps=B.puertasCalc();
  if(!ps.length){cont.innerHTML='<div class="nota">Sin datos de cumplimiento por ahora.</div>';return;}
  var rank={rojo:1,amar:2,verde:3,gris:2};
  var abrir=-1,peor=99;
  ps.forEach(function(p,i){
    if(/bbva|hipoteca/i.test(String(p.puerta))&&(rank[p.estado]||2)<peor){peor=rank[p.estado]||2;abrir=i;}
  });
  var html=ps.map(function(p,i){
    var bb=/bbva|hipoteca/i.test(String(p.puerta));
    var cls="pta "+B.clase(p.estado)+(bb?" bbva":"")+(i===abrir?" open":"");
    var subs=(p.subs||[]).map(function(s){
      var sc=dotVar(B.clase(s.semaforo));
      return '<div><span style="color:var(--'+sc+');">●</span> '+B.esc(s.sub_estado||"—")+
        ' — '+B.esc(s.descripcion||"")+
        ' <span class="nota">('+B.esc(s.responsable_nombre||"—")+
        (s.fecha_compromiso?", "+B.esc(B.fmtFecha(s.fecha_compromiso)):"")+')</span></div>';
    }).join("");
    return '<div class="'+cls+'">'+
      '<div class="cab" onclick="togglePta(this)"><span class="p"></span>'+
      '<span>'+B.esc(p.puerta)+'</span>'+
      (bb?'<span style="color:var(--rojo);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;">frena la venta</span>':"")+
      '<span class="chev">▾</span></div>'+
      '<div class="cuerpo">'+(subs||'<div class="nota">Sin sub-pasos registrados.</div>')+'</div></div>';
  }).join("");
  cont.innerHTML='<div class="puertas">'+html+'</div>';
}

/* ---------- 2. ATACABLES AHORA ---------- */
function pintarAtacables(B){
  var cont=B.$("secAtac");if(!cont)return;
  var fr=B.frontera(6);
  if(!fr.length){cont.innerHTML='<div class="nota">No hay trámites listos para atacar en este momento.</div>';return;}
  cont.innerHTML='<div class="tgrid">'+fr.map(function(t){
    return '<div class="tcard" style="border-left-color:var(--negro);" onclick="abrirFicha(\''+idSafe(t.tramite_id)+'\')">'+
      '<h4>'+B.esc(t.nombre)+'</h4>'+
      '<div class="meta">'+B.esc(t.responsable_nombre||"—")+'</div>'+
      '<div class="meta">'+B.esc(B.fmtEta(B.etaDe(t)))+'</div></div>';
  }).join("")+'</div>';
}

/* ---------- 3. SEMÁFORO: filtros + grid ---------- */
window.setFiltro=function(f){
  FILTRO=String(f||"todos");
  if(BREF){pintarEtapas(BREF);pintarFiltros(BREF);pintarGrid(BREF);}
};
window.setFiltroEtapa=function(id){var f="etapa:"+idSafe(id);setFiltro(FILTRO===f?"todos":f);};
window.setVista=function(v){
  VISTA=(v==="lista"||v==="board"||v==="trabajo")?v:"ruta";
  var ids={ruta:"Ruta",trabajo:"Trabajo",board:"Board",lista:"Lista"};Object.keys(ids).forEach(function(x){var e=document.getElementById("v"+ids[x]);if(e)e.className=VISTA===x?"on":"";});
  if(BREF){pintarFiltros(BREF);pintarGrid(BREF);}
};
window.setRouteZoom=function(v){ROUTE_ZOOM=String(v||"90");if(BREF)pintarGrid(BREF);};
window.toggleRouteCritica=function(){ROUTE_CRITICA=!ROUTE_CRITICA;if(BREF)pintarGrid(BREF);};
function pintarFiltros(B){
  var cont=B.$("secFiltros");if(!cont)return;
  if(VISTA==="trabajo"||VISTA==="ruta"){cont.innerHTML="";return;}
  var c=B.conteos();
  var ts=B.tabla("TRAMITES");
  var nGates=0,nUrg=0;
  ts.forEach(function(t){if(esSi(t.gate))nGates++;if(esSi(t.urgente))nUrg++;});
  var chips=[
    ["todos","Todos",c.total],
    ["verde","Hechos",c.verde,"ti-circle-check"],
    ["amar","En proceso",c.amar,"ti-clock"],
    ["rojo","Faltan",c.rojo],
    ["gate","gates",nGates,"ti-lock"],
    ["urgente","Urgentes",nUrg]
  ];
  cont.innerHTML=chips.map(function(ch){
    return '<span class="chip'+(FILTRO===ch[0]?" on":"")+'" onclick="setFiltro(\''+ch[0].replace(/'/g,"")+'\')">'+
      (ch[3]?'<i class="ti '+ch[3]+'"></i> ':'')+B.esc(ch[1])+' · '+ch[2]+'</span>';
  }).join("");
}
function pasaFiltro(B,t){
  var f=FILTRO;
  if(f==="todos")return true;
  if(f==="verde"||f==="amar"||f==="rojo")return B.clase(t.estado)===f;
  if(f==="gate")return esSi(t.gate);
  if(f==="urgente")return esSi(t.urgente);
  if(f.indexOf("etapa:")===0)return idSafe(t.paquete_etapa)===f.slice(6);
  return true;
}
function pintarGanttRuta(B,lista,cont){
  var DAY=864e5,LW=250,RH=38,GH=30,PX=ROUTE_ZOOM==="30"?5.2:(ROUTE_ZOOM==="365"?.72:(ROUTE_ZOOM==="all"?.42:2.15)),hoy=new Date();hoy.setHours(12,0,0,0);
  function fecha(s){var m=String(s||"").match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);return m?new Date(+m[1],+m[2]-1,+m[3],12):null;}
  function suma(d,w){return new Date(d.getTime()+w*7*DAY);}
  var by={},items=lista.map(function(t){var x={t:t,id:String(t.tramite_id||""),ini:fecha(t.fecha_inicio_est),fin:fecha(t.fecha_real_fin),dur:Number(t.duracion_sem)||4,inf:false,deps:[]};by[x.id]=x;return x;});
  items.forEach(function(x){x.deps=String(x.t.depende_de||"").split(/[,;\s]+/).filter(function(id){return by[id];});if(x.fin&&!x.ini)x.ini=suma(x.fin,-x.dur);if(x.ini&&!x.fin)x.fin=suma(x.ini,x.dur);});
  for(var p=0;p<items.length+1;p++)items.forEach(function(x){if(x.ini)return;var mx=null;x.deps.forEach(function(id){if(by[id].fin&&(!mx||by[id].fin>mx))mx=by[id].fin;});if(mx||!x.deps.length){x.ini=mx||hoy;x.fin=suma(x.ini,x.dur);x.inf=true;}});
  items.forEach(function(x){if(!x.ini){x.ini=hoy;x.fin=suma(hoy,x.dur);x.inf=true;}});
  var min=hoy,max=hoy;items.forEach(function(x){if(x.ini<min)min=x.ini;if(x.fin>max)max=x.fin;});min=new Date(min.getTime()-10*DAY);max=new Date(max.getTime()+25*DAY);function X(d){return Math.round((d-min)/DAY*PX);}var W=X(max)+40;
  var orden={},nombres={};B.hitosOrd().forEach(function(h,i){orden[h.hito_id]=i;nombres[h.hito_id]=h.nombre;});var grupos={};items.forEach(function(x){var g=String(x.t.paquete_etapa||"Sin etapa");(grupos[g]=grupos[g]||[]).push(x);});var gk=Object.keys(grupos).sort(function(a,b){return (orden[a]==null?99:orden[a])-(orden[b]==null?99:orden[b]);});
  var filas=[],y=0;gk.forEach(function(g){filas.push({g:g,y:y});y+=GH;grupos[g].sort(function(a,b){return a.ini-b.ini;}).forEach(function(x){x.y=y;filas.push({x:x,y:y});y+=RH;});});
  var meses="",d=new Date(min.getFullYear(),min.getMonth(),1,12),mn=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];while(d<max){meses+='<span class="mes" style="left:'+Math.max(0,X(d))+'px">'+mn[d.getMonth()]+' '+String(d.getFullYear()).slice(2)+'</span>';d=new Date(d.getFullYear(),d.getMonth()+1,1,12);}
  var zooms=[["30","30 días"],["90","90 días"],["365","12 meses"],["all","Todo"]];var ctl='<div class="routectl"><div><b>Escala</b>'+zooms.map(function(z){return '<button class="'+(ROUTE_ZOOM===z[0]?'on':'')+'" onclick="setRouteZoom(\''+z[0]+'\')">'+z[1]+'</button>';}).join('')+'</div><button class="critical '+(ROUTE_CRITICA?'on':'')+'" onclick="toggleRouteCritica()">◆ Solo conexiones críticas</button></div>';
  var stageleg='<div class="stagelegend"><b>Color de conexión:</b>'+B.hitosOrd().map(function(h,i){return '<span class="e'+(i%6)+'"><i></i>'+B.esc(String(h.nombre||h.hito_id).replace(/\s*\(cerrada\)/i,''))+'</span>';}).join('')+'</div>';
  var html=ctl+'<div class="routelegend"><span><i class="lg done"></i>Terminado</span><span><i class="lg doing"></i>En curso</span><span><i class="lg missing"></i>Falta</span><span><i class="lg estimate"></i>Fecha estimada</span></div>'+stageleg+'<div class="gwrap routeg"><div class="gcanvas" style="width:'+(LW+W)+'px"><div class="ghead"><div class="gl" style="width:'+LW+'px">TRÁMITE / ETAPA</div><div style="position:relative;width:'+W+'px">'+meses+'</div></div><div class="gbody" style="height:'+y+'px">';
  filas.forEach(function(f){if(f.g!=null)html+='<div class="grow grp"><div class="gl" style="width:'+(LW+W)+'px">'+B.esc(nombres[f.g]||f.g)+' · '+grupos[f.g].length+'</div></div>';else{var x=f.x,cl=B.clase(x.t.estado),left=X(x.ini),w=Math.max(9,X(x.fin)-left);html+='<div class="grow" style="height:'+RH+'px"><div class="gl" style="width:'+LW+'px" data-id="'+B.esc(x.id)+'"><span class="tid">'+B.esc(x.id)+'</span><span class="rname">'+B.esc(x.t.nombre)+'</span></div><div class="zona" style="width:'+W+'px"><div class="gbar '+cl+(x.inf?' inferido':'')+'" data-id="'+B.esc(x.id)+'" style="left:'+left+'px;width:'+w+'px" title="'+B.esc(x.t.nombre)+'"></div></div></div>';}});
  var paths="",ports="",edge=0,entrada={},salida={};items.forEach(function(x){x.deps.forEach(function(id){var a=by[id];if(!a)return;if(ROUTE_CRITICA&&String(x.t.ruta_critica||"").toLowerCase()==="no"&&String(a.t.ruta_critica||"").toLowerCase()==="no")return;var si=salida[id]||0,ei=entrada[x.id]||0;salida[id]=si+1;entrada[x.id]=ei+1;var x1=X(a.fin)+4,x2=X(x.ini)-9,y1=a.y+RH/2+(si%5-2)*3,y2=x.y+RH/2+(ei%5-2)*3,lane=Math.max(x1+14,x2-18-(edge%6)*5),stage=orden[x.t.paquete_etapa],sc='e'+((stage==null?6:stage)%6);if(x2<=x1+18)lane=Math.max(x1,x2)+22+(edge%5)*6;paths+='<path class="routepath '+sc+(String(x.t.ruta_critica||'').toLowerCase()!=='no'?' criticalpath':'')+'" data-from="'+B.esc(id)+'" data-to="'+B.esc(x.id)+'" d="M'+x1+' '+y1+' H'+lane+' V'+y2+' H'+x2+'" marker-end="url(#arrow-'+sc+')"/>';ports+='<circle class="routeport '+sc+'" cx="'+x1+'" cy="'+y1+'" r="3"/><circle class="routeport '+sc+' in" cx="'+(x2+7)+'" cy="'+y2+'" r="3"/>';edge++;});});
  var defs='<defs>';for(var ai=0;ai<6;ai++)defs+='<marker id="arrow-e'+ai+'" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path class="arrowhead e'+ai+'" d="M1 1L7 4L1 7"/></marker>';defs+='</defs>';
  html+='<svg class="garrows routearrows" style="left:'+LW+'px;width:'+W+'px;height:'+y+'px">'+defs+paths+ports+'</svg><div class="ghoyl" style="left:'+(LW+X(hoy))+'px"><span>HOY</span></div></div></div></div><div class="routehint">Colores = etapa que se desbloquea · línea gruesa = ruta crítica · toca una barra para abrir su ficha. Las conexiones salen de <b>depende_de</b> en Sheets.</div>';
  cont.innerHTML=html;Array.prototype.forEach.call(cont.querySelectorAll('[data-id]'),function(el){el.onclick=function(){abrirFicha(el.getAttribute('data-id'));};});
}
function calidadRuta(ts){var activos=ts.filter(function(t){return String(t.tipo||"tramite")==="tramite"&&BREF.clase(t.estado)!=="verde";}),faltas=0;activos.forEach(function(t){if(!String(t.proxima_accion||"").trim())faltas++;if(!String(t.responsable_accion||t.responsable_nombre||"").trim())faltas++;if(!String(t.fecha_revision||t.fecha_compromiso||"").trim())faltas++;});var total=Math.max(1,activos.length*3),pct=Math.max(0,Math.round((total-faltas)/total*100));return{pct:pct,faltas:faltas,activos:activos.length};}
function pintarGrid(B){
  var cont=B.$("secGrid");if(!cont)return;
  var ts=B.tabla("TRAMITES");
  if(!ts.length){cont.innerHTML='<div class="nota">Sin trámites cargados en el Sheet.</div>';return;}
  var vis=ts.filter(function(t){return pasaFiltro(B,t);});
  if(!vis.length){cont.innerHTML='<div class="nota">Ningún trámite coincide con este filtro.</div>';return;}
  var em=mapaEtapas(B);
  if(VISTA==="ruta"){var q=calidadRuta(ts);B.$("secResumen").innerHTML='<div class="routehero"><div><span>MAPA MAESTRO</span><h1>Ruta conectada del proyecto</h1><p>Las barras muestran tiempo; las flechas, qué trámite habilita al siguiente. Las fechas rayadas son estimaciones calculadas.</p></div><div class="quality"><b>'+q.pct+'%</b><small>calidad operativa</small><em>'+q.faltas+' datos por completar en Sheets</em></div></div>';pintarGanttRuta(B,vis,cont);return;}
  function tarjeta(t,compacta){
    var cl=B.clase(t.estado);
    var ola=String(t.ola||"").trim();
    var badges='';
    var etapa=em[String(t.paquete_etapa||"").trim()]||null;
    if(etapa)badges+='<span class="stagebadge e'+(etapa.i%6)+'"><i>◆</i> Desbloquea '+B.esc(etapa.h.nombre||etapa.h.hito_id)+'</span>';
    else if(String(t.paquete_etapa||"").trim())badges+='<span class="stagebadge cond"><i>◇</i> '+B.esc(t.paquete_etapa)+'</span>';
    if(ola&&!/^(HECHO|COND)$/i.test(ola))badges+='<span class="olab">ola '+B.esc(ola)+'</span>';
    if(esSi(t.gate))badges+='<span class="olab">🔑 gate</span>';
    if(esSi(t.urgente)&&cl!=="verde")badges+='<span class="olab warn">urgente</span>';
    var docs=B.docsDeTramite(t.tramite_id).length;
    return '<div class="tcard '+cl+(etapa?' tech-e'+(etapa.i%6):'')+(compacta?' compacta':'')+'" onclick="abrirFicha(\''+idSafe(t.tramite_id)+'\')">'+
      '<span class="st"><span class="p"></span>'+B.esc(t.estado||"—")+'</span>'+
      '<h4>'+B.esc(t.nombre)+'</h4>'+
      (badges?'<div style="margin:2px 0 5px;">'+badges+'</div>':"")+
      '<div class="meta">'+B.esc(t.tramite_id||"")+(t.fecha_inicio_est?' · '+B.esc(B.fmtFecha(t.fecha_inicio_est)):'')+'</div>'+
      (docs?'<div class="doccount">📄 '+docs+' documento'+(docs===1?'':'s')+'</div>':'')+'</div>';
  }
  if(VISTA==="trabajo"){
    var hid=FILTRO.indexOf("etapa:")===0?FILTRO.slice(6):String((B.etapaActual().cur||{}).hito_id||"");
    var etapa=ts.filter(function(t){return idSafe(t.paquete_etapa)===hid;});
    var by={};ts.forEach(function(t){by[String(t.tramite_id||"").trim()]=t;});
    var lanes={listo:[],proceso:[],bloqueado:[],terminado:[]};
    etapa.forEach(function(t){var cl=B.clase(t.estado);if(cl==="verde"){lanes.terminado.push(t);return;}var deps=String(t.depende_de||"").split(",").map(function(x){return x.trim();}).filter(Boolean);var blocked=deps.some(function(id){return !by[id]||B.clase(by[id].estado)!=="verde";});if(blocked){lanes.bloqueado.push(t);return;}lanes[cl==="amar"?"proceso":"listo"].push(t);});
    function prioridad(a,b){var au=esSi(a.urgente)?0:1,bu=esSi(b.urgente)?0:1;if(au!==bu)return au-bu;var ag=esSi(a.gate)?0:1,bg=esSi(b.gate)?0:1;if(ag!==bg)return ag-bg;return String(a.fecha_compromiso||a.fecha_inicio_est||"9999")<String(b.fecha_compromiso||b.fecha_inicio_est||"9999")?-1:1;}
    lanes.listo.sort(prioridad);lanes.proceso.sort(prioridad);lanes.bloqueado.sort(prioridad);
    pintarResumen(B,hid,etapa,lanes);
    function iniciales(s){var stop={de:1,del:1,la:1,el:1,y:1,para:1};return String(s||"Dependencia").split(/\s+/).filter(function(x){return x&&!stop[x.toLowerCase()];}).slice(0,3).map(function(x){return x.charAt(0);}).join("").toUpperCase();}
    function depIcon(t){var s=String(t.dependencia||t.autoridad||"").toLowerCase();var path=/agua|ooapas|conagua/.test(s)?'<path d="M12 3s6 6.5 6 11a6 6 0 1 1-12 0c0-4.5 6-11 6-11Z"/><path d="M9 15c.8 1.2 1.8 1.8 3 1.8"/>':/cfe|electric|energ/.test(s)?'<path d="m13 2-7 12h6l-1 8 7-13h-6l1-7Z"/>':/protecci|bombero|riesgo/.test(s)?'<path d="M12 3 5 6v5c0 4.7 2.8 8 7 10 4.2-2 7-5.3 7-10V6l-7-3Z"/><path d="m9 12 2 2 4-4"/>':/catastro|predial|registro|notari/.test(s)?'<path d="M4 21h16M6 18h12M5 8l7-5 7 5M7 9v7m5-7v7m5-7v7"/>':'<path d="M3 21h18M5 18h14M4 9l8-6 8 6M7 10v6m5-6v6m5-6v6"/>';return '<svg viewBox="0 0 24 24" aria-hidden="true">'+path+'</svg>';}
    function corta(s,n){s=String(s||"").trim();return s.length>n?s.slice(0,n-1).replace(/\s+\S*$/,"")+"…":s;}
    function workCard(t,key){var dep=String(t.dependencia||t.autoridad||"Sin dependencia");var accion=String(t.proxima_accion||t.decision||"").trim();var desc=accion?"Próxima acción: "+corta(accion,125):"Próxima acción pendiente de definir en Sheets.";var docs=B.docsDeTramite(t.tramite_id).length;var pending=String(t.depende_de||"").split(",").map(function(x){return x.trim();}).filter(function(id){return !by[id]||B.clase(by[id].estado)!=="verde";});var nombres=pending.map(function(id){return by[id]?by[id].nombre:id+" (no encontrado)";});var estado={listo:"SE PUEDE INICIAR",proceso:"EN CURSO",bloqueado:"EN ESPERA",terminado:"TERMINADO"}[key];var fecha=t.fecha_compromiso||t.fecha_inicio_est;return '<div class="workcard visual" role="button" tabindex="0" onclick="abrirFicha(\''+idSafe(t.tramite_id)+'\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();abrirFicha(\''+idSafe(t.tramite_id)+'\')}"><div class="depbrand"><span class="depseal">'+depIcon(t)+'</span><span><b>'+B.esc(dep)+'</b><small>'+B.esc(t.tramite_id)+'</small></span><em class="statebadge '+key+'">'+estado+'</em></div><h4>'+B.esc(t.nombre)+'</h4><p class="carddesc">'+B.esc(desc)+'</p><div class="cardfoot"><span>'+B.esc(t.responsable_nombre||"Sin responsable")+(fecha?' · '+B.esc(B.fmtFecha(fecha)):' · sin fecha')+'</span><span>'+(docs?docs+' doc'+(docs===1?'':'s'):'Ver ficha')+' →</span></div>'+(key==="bloqueado"?'<div class="blockedby">En espera de: '+B.esc(nombres.join(" · ")||"decisión externa")+'</div>':'')+'</div>';}
    function laneIcon(key){var paths={listo:'<path d="M5 12h12m-5-5 5 5-5 5"/>',proceso:'<path d="M12 3a9 9 0 1 1-6.4 2.7"/><path d="M3 3v6h6"/>',bloqueado:'<rect x="5" y="10" width="14" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>',terminado:'<circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/>'};return '<svg class="laneicon" viewBox="0 0 24 24" aria-hidden="true">'+paths[key]+'</svg>';}
    function lane(key,title){var xs=lanes[key],top=xs.slice(0,5),rest=xs.slice(5);var cards=top.map(function(t){return workCard(t,key);}).join("");if(rest.length)cards+='<details class="morecards"><summary>Ver '+rest.length+' trámite'+(rest.length===1?'':'s')+' más</summary><div class="workcards">'+rest.map(function(t){return workCard(t,key);}).join("")+'</div></details>';return '<section class="worklane '+key+'"><h3>'+laneIcon(key)+title+' <span>'+xs.length+'</span></h3><div class="workcards">'+(xs.length?cards:'<div class="nota empty">Sin trámites aquí.</div>')+'</div></section>';}
    function accionHoy(t,i){var ac=String(t.proxima_accion||t.decision||"").trim()||"Definir próxima acción en Sheets";var fecha=t.fecha_compromiso||t.fecha_inicio_est;return '<button class="nextitem" onclick="abrirFicha(\''+idSafe(t.tramite_id)+'\')"><b>'+(i+1)+'. '+B.esc(corta(ac,80))+'</b><span>'+B.esc(t.responsable_nombre||"Sin responsable")+(fecha?' · '+B.esc(B.fmtFecha(fecha)):' · sin fecha')+'</span><small>'+B.esc(t.nombre)+' →</small></button>';}
    var siguientes=lanes.proceso.concat(lanes.listo).sort(prioridad).slice(0,3);
    cont.innerHTML=(siguientes.length?'<section class="nextstrip"><div class="nexthead"><span>LO SIGUIENTE</span><b>'+siguientes.length+' movimiento'+(siguientes.length===1?'':'s')+' para destrabar '+B.esc((mapaEtapas(B)[hid]||{h:{nombre:hid}}).h.nombre||hid)+'</b></div><div class="nextgrid">'+siguientes.map(accionHoy).join("")+'</div></section>':'')+'<div class="workview">'+lane("listo","Se pueden iniciar")+lane("proceso","En curso")+lane("bloqueado","En espera")+'<details class="donefold"><summary>Terminados ('+lanes.terminado.length+')</summary>'+lane("terminado","Terminados")+'</details></div>';
    return;
  }
  B.$("secResumen").innerHTML="";
  if(VISTA==="lista"){cont.innerHTML='<div class="tgrid">'+vis.map(function(t){return tarjeta(t,false);}).join("")+'</div>';return;}
  var grupos={},orden=[];
  vis.forEach(function(t){var d=String(t.dependencia||t.autoridad||"Sin dependencia").trim()||"Sin dependencia";if(!grupos[d]){grupos[d]=[];orden.push(d);}grupos[d].push(t);});
  cont.innerHTML='<div class="kanban" aria-label="Trámites agrupados por dependencia">'+orden.map(function(d){
    var xs=grupos[d],pend=xs.filter(function(t){return B.clase(t.estado)!=="verde";}).length;
    return '<section class="kcol"><header class="khead"><h3>'+B.esc(d)+'</h3><span>'+xs.length+' · '+pend+' pendientes</span></header><div class="kbody">'+xs.map(function(t){return tarjeta(t,true);}).join("")+'</div></section>';
  }).join("")+'</div>';
}

function pintarResumen(B,hid,etapa,lanes){
  var cont=B.$("secResumen");if(!cont)return;var em=mapaEtapas(B),e=em[hid],name=e?e.h.nombre:hid;
  cont.innerHTML='<div class="workhero"><div><span class="eyebrow">Etapa que estamos destrabando</span><h1>'+B.esc(name||"Proyecto")+'</h1><p>Viendo '+etapa.length+' trámites · '+lanes.terminado.length+' terminados</p></div><div class="workstats"><b>'+lanes.listo.length+'<small>pueden iniciar</small></b><b>'+lanes.proceso.length+'<small>en curso</small></b><b>'+lanes.bloqueado.length+'<small>en espera</small></b></div></div>';
}

/* ---------- 4. FICHA CANÓNICA ---------- */
window.abrirFicha=function(id){
  var B=BREF;if(!B)return;
  var t=B.tramitePor(id);
  if(!t){B.toast("Trámite no encontrado",true);return;}
  var cl=B.clase(t.estado);
  var h='<h3>'+B.esc(t.nombre)+'</h3>';
  h+='<div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px;">'+
    '<span style="width:9px;height:9px;border-radius:50%;background:var(--'+dotVar(cl)+');display:inline-block;"></span>'+
    B.esc(t.estado||"—")+'</div>';
  var ola=String(t.ola||"").trim();
  var badges='';
  if(String(t.paquete_etapa||"").trim())badges+='<span class="olab">'+B.esc(t.paquete_etapa)+'</span>';
  if(ola&&!/^(HECHO|COND)$/i.test(ola))badges+='<span class="olab">ola '+B.esc(ola)+'</span>';
  else if(/^COND$/i.test(ola))badges+='<span class="olab">condicional</span>';
  if(esSi(t.gate))badges+='<span class="olab">🔑 gate</span>';
  if(esSi(t.urgente))badges+='<span class="olab warn">urgente</span>';
  if(badges)h+='<div style="margin-top:6px;">'+badges+'</div>';
  h+='<div class="nota" style="margin-top:8px;">Autoridad: '+B.esc(t.autoridad||"—")+
     ' · Responsable: '+B.esc(t.responsable_nombre||"—")+'</div>';
  /* fechas */
  var fechas=[];
  if(String(t.fecha_inicio_est||"").trim())fechas.push("Inicio est.: "+B.esc(B.fmtFecha(t.fecha_inicio_est)));
  if(B.clase(t.estado)!=="verde")fechas.push("ETA: "+B.esc(B.fmtEta(B.etaDe(t))));
  if(String(t.fecha_real_fin||"").trim())fechas.push("Terminado: "+B.esc(B.fmtFecha(t.fecha_real_fin)));
  h+='<div class="nota" style="margin-top:4px;">'+fechas.join(" · ")+'</div>';
  /* por qué importa — completo, sin truncar */
  if(String(t.por_que_importa||"").trim())
    h+='<div class="hint" style="margin-top:12px;">'+B.esc(t.por_que_importa)+'</div>';
  /* oficio / folio → doc vigente en Drive si alguno lo referencia */
  var folio=String(t.oficio_folio||"").trim();
  if(folio){
    var doc=null;
    B.docsVigentes().forEach(function(d){
      if(doc)return;
      var pajar=String(d.titulo||"")+" "+String(d.notas||"");
      if(pajar.indexOf(folio)>=0&&String(d.doc_id||"").trim())doc=d;
    });
    if(doc)h+='<div style="margin-top:10px;font-size:12.5px;">Oficio/folio: '+
      '<a href="https://drive.google.com/file/d/'+encodeURIComponent(String(doc.doc_id).trim())+'/view" target="_blank" rel="noopener">'+
      B.esc(folio)+' — '+B.esc(doc.titulo)+'</a></div>';
    else h+='<div style="margin-top:10px;font-size:12.5px;">Oficio/folio: '+B.esc(folio)+'</div>';
  }
  /* evidencia anclada: documento principal + soportes (Drive) */
  var lkp=String(t.link||"").trim();
  if(/^https?:\/\//i.test(lkp))
    h+='<div style="margin-top:10px;font-size:12.5px;">📂 <a href="'+B.esc(lkp)+'" target="_blank" rel="noopener">Documento principal en Drive</a></div>';
  var sopp=[];try{sopp=JSON.parse(t.soportes||"[]");}catch(e){sopp=[];}
  if(sopp.length)
    h+='<div class="nota" style="margin-top:6px;">Soportes: '+sopp.map(function(s){return /^https?:\/\//i.test(String(s.u||""))?('<a href="'+B.esc(s.u)+'" target="_blank" rel="noopener">'+B.esc(s.t||"archivo")+'</a>'):"";}).filter(Boolean).join(" · ")+'</div>';
  var canon=B.docsDeTramite(t.tramite_id);
  if(canon.length){
    h+='<div class="nota" style="margin-top:10px;">Documentos canónicos</div>';
    canon.forEach(function(d){var u=B.docUrl(d),m=B.docMeta(d);if(!u)return;
      h+='<div style="font-size:12.5px;margin-top:4px;"><a href="'+B.esc(u)+'" target="_blank" rel="noopener">📄 '+B.esc(d.titulo||"Documento")+'</a>'+
        (m&&/^si$/i.test(m.listo_imprimir)?' <span class="chip cat" style="cursor:default;">listo para imprimir</span>':'')+'</div>';
    });
  }
  /* formato oficial de ingreso (DGIUE/estatal) + entregables */
  if(String(t.formato_url||"").trim())
    h+='<div class="nota" style="margin-top:8px;">Formato: '+
       String(t.formato_url).split(" · ").map(function(p){p=p.trim();
         return p.replace(/(https?:\/\/\S+)/,function(u){
           return '<a href="'+B.esc(u)+'" target="_blank" rel="noopener">'+B.esc(decodeURIComponent(u.split("/").pop()))+'</a>';});
       }).join(" · ")+'</div>';
  if(String(t.entregables||"").trim())
    h+='<div class="nota" style="margin-top:6px;">Entregables: '+B.esc(t.entregables)+'</div>';
  /* costo (solo con clave de vista — nunca en modo público) */
  if(!B.lite()&&String(t.costo_estimado||"").trim())
    h+='<div class="nota" style="margin-top:6px;">Costo estimado: '+B.esc(B.money(t.costo_estimado))+'</div>';
  /* videos del trámite */
  var vids=B.videosPor()[String(t.tramite_id||"").trim()]||[];
  if(vids.length){
    h+='<div class="nota" style="margin-top:12px;">Videos</div><div class="vidrow">';
    vids.forEach(function(v){
      if(!/^http/i.test(String(v.url||"")))return;
      h+='<a class="vid" href="'+B.esc(v.url)+'" target="_blank" rel="noopener" title="'+B.esc(v.titulo||"video")+'">▶</a>';
    });
    h+='</div>';
  }
  /* dependencias → fichas internas */
  var deps=String(t.depende_de||"").split(",").map(function(s){return s.trim();}).filter(Boolean);
  if(deps.length){
    h+='<div class="nota" style="margin-top:12px;">Depende de</div><div style="font-size:12.5px;line-height:1.9;">';
    deps.forEach(function(d){
      var p=B.tramitePor(d);
      h+='<div><a href="#" onclick="abrirFicha(\''+idSafe(d)+'\');return false;">'+
        B.esc(p?p.nombre:d)+'</a>'+
        (p?' <span style="color:var(--'+dotVar(B.clase(p.estado))+');">●</span>':"")+'</div>';
    });
    h+='</div>';
  }
  if(String(t.decision||"").trim())
    h+='<div class="nota" style="margin-top:10px;">Decisión: '+B.esc(t.decision)+'</div>';
  if(String(t.notas||"").trim())
    h+='<div class="nota" style="margin-top:6px;">'+B.esc(t.notas)+'</div>';
  var op=[['Próxima acción',t.proxima_accion],['Responsable de acción',t.responsable_accion||t.responsable_nombre],['Fecha de revisión',t.fecha_revision||t.fecha_compromiso],['Prioridad',t.prioridad],['Motivo de espera',t.motivo_espera],['Condición para desbloquear',t.condicion_desbloqueo],['Qué desbloquea',t.que_desbloquea],['Última actualización',t.ultima_actualizacion]];
  h+='<div class="opbox"><b>Control operativo desde Sheets</b>'+op.map(function(x){return '<div><span>'+B.esc(x[0])+'</span><strong class="'+(String(x[1]||'').trim()?'':'missing')+'">'+B.esc(x[1]||'Pendiente de completar')+'</strong></div>';}).join('');var su=B.config('sheet_maestro_url');if(/^https:\/\//.test(su))h+='<a class="btn sheetedit" href="'+B.esc(su)+'#gid=832051451" target="_blank" rel="noopener">Editar registro maestro en Sheets ↗</a>';h+='</div>';
  B.modal(h);
};

/* ---------- 5. DEEP-LINK ---------- */
function manejarHash(){
  var h=String(location.hash||"");
  if(!h)return;
  if(h==="#legal"){var el=document.getElementById("legal");if(el)el.scrollIntoView();return;}
  if(/^#T/i.test(h))window.abrirFicha(decodeURIComponent(h.slice(1)));
}

/* ---------- 6. MINI-MAPA DE DEPENDENCIAS ---------- */
function pintarMapa(B){
  var cont=B.$("secMapa");if(!cont)return;
  var ea=B.etapaActual(),cur=ea.cur;
  if(!cur){cont.innerHTML='<div class="nota">Todas las etapas están completas; no hay gates pendientes que mapear.</div>';return;}
  var gates=B.gatesDe(cur.hito_id);
  if(!gates.length){cont.innerHTML='<div class="nota">La etapa actual no tiene trámites gate registrados en el Sheet.</div>';return;}
  /* nodos = gates de la etapa actual + sus dependencias directas */
  var set={},orden=[];
  function add(t){var id=String(t.tramite_id||"").trim();if(id&&!set[id]){set[id]=t;orden.push(id);}}
  gates.forEach(add);
  gates.forEach(function(t){
    String(t.depende_de||"").split(",").forEach(function(d){
      d=d.trim();if(!d)return;var p=B.tramitePor(d);if(p)add(p);
    });
  });
  /* límite de densidad: 14 nodos priorizando ruta crítica */
  if(orden.length>14){
    orden.sort(function(a,b){
      var ra=(String(set[a].ruta_critica||"")==="no")?1:0;
      var rb=(String(set[b].ruta_critica||"")==="no")?1:0;
      return ra-rb;
    });
    orden=orden.slice(0,14);
    var keep={};orden.forEach(function(id){keep[id]=set[id];});set=keep;
  }
  /* profundidad: 0 = sin dependencias no-verdes dentro del set */
  var depth={};
  function depthOf(id,guard){
    if(depth[id]!=null)return depth[id];
    if(guard[id])return 0;
    guard[id]=true;
    var mx=-1;
    String(set[id].depende_de||"").split(",").forEach(function(d){
      d=d.trim();
      if(!d||!set[d])return;
      if(B.clase(set[d].estado)==="verde")return;
      var v=depthOf(d,guard);if(v>mx)mx=v;
    });
    depth[id]=mx+1;
    return depth[id];
  }
  orden.forEach(function(id){depthOf(id,{});});
  /* layout por columnas */
  var NW=190,NH=38,CW=230,RH=54,PADX=10,PADY=26;
  var cols={},maxD=0;
  orden.forEach(function(id){var d=depth[id]||0;if(d>maxD)maxD=d;(cols[d]=cols[d]||[]).push(id);});
  var maxRows=0,pos={};
  for(var d=0;d<=maxD;d++){
    var col=cols[d]||[];
    if(col.length>maxRows)maxRows=col.length;
    col.forEach(function(id,i){pos[id]={x:PADX+d*CW,y:PADY+i*RH};});
  }
  var W=PADX*2+maxD*CW+NW,H=PADY*2+Math.max(1,maxRows)*RH;
  var colores={verde:"#8FBF8B",amar:"#D9A45B",rojo:"#E0605A",gris:"#8a8780"};
  var s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="mapaT" style="width:100%;height:auto;max-width:'+W+'px;">';
  s+='<title id="mapaT">Mapa de dependencias de los gates de la etapa: '+B.esc(cur.nombre||cur.hito_id)+'</title>';
  s+='<defs><marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8a8780"/></marker></defs>';
  /* flechas primero (debajo de las cajas) */
  orden.forEach(function(id){
    String(set[id].depende_de||"").split(",").forEach(function(dep){
      dep=dep.trim();
      if(!dep||!pos[dep]||!pos[id])return;
      var a=pos[dep],b=pos[id];
      s+='<line x1="'+(a.x+NW)+'" y1="'+(a.y+NH/2)+'" x2="'+b.x+'" y2="'+(b.y+NH/2)+
         '" stroke="#8a8780" stroke-width="1.4" marker-end="url(#arr)"/>';
    });
  });
  /* nodos */
  orden.forEach(function(id){
    var t=set[id],p=pos[id];if(!p)return;
    var c=colores[B.clase(t.estado)]||colores.gris;
    var nom=String(t.nombre||id);
    if(nom.length>26)nom=nom.substring(0,25)+"…";
    s+='<g onclick="abrirFicha(\''+idSafe(id)+'\')" style="cursor:pointer;">'+
      '<title>'+B.esc(t.nombre||id)+'</title>'+
      '<rect x="'+p.x+'" y="'+p.y+'" width="'+NW+'" height="'+NH+'" rx="8" fill="'+c+'"/>'+
      '<text x="'+(p.x+NW/2)+'" y="'+(p.y+NH/2+3.5)+'" text-anchor="middle" fill="#0a0a0c" font-family="Manrope,Arial,sans-serif" font-size="10.5">'+B.esc(nom)+'</text></g>';
  });
  s+='</svg>';
  cont.innerHTML='<div class="card" style="overflow-x:auto;">'+s+
    '<div class="nota" style="margin-top:6px;">Gates de la etapa actual y sus dependencias directas · toca una caja para abrir la ficha.</div></div>';
}

/* ---------- render principal (puede llamarse varias veces) ---------- */
window.renderPage=function(B){
  BREF=B;
  pintarEtapas(B);
  pintarLegal(B);
  pintarFiltros(B);
  pintarGrid(B);
  pintarMapa(B);
  B.$("stamp").textContent="Actualizado: "+(B.meta().actualizado?new Date(B.meta().actualizado).toLocaleString("es-MX"):"—");
  if(!WIRED){
    WIRED=true;
    window.addEventListener("hashchange",manejarHash);
    manejarHash(); /* deep-link inicial: #T… abre ficha, #legal hace scroll */
  }
};
